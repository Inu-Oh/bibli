{% extends "base_generic.html" %}


{% block content %}
<h1>Register / edit book copy</h1>
<p>Title: <strong>{{ book }}</strong></p>
<p>Author: {{ book.author }}</p>

<form action="" method="post">
  {% csrf_token %}
  <table>
    {{ form.as_table }}
  </table>
  <input type="submit" value="Submit" />
</form>
{% endblock %}
